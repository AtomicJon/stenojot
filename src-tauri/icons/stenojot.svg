<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#45b7af"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle border to match dark theme -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="#2a2a4a" stroke-width="4"/>

  <!-- Microphone body -->
  <rect x="212" y="100" width="88" height="160" rx="44" ry="44" fill="url(#accent)"/>

  <!-- Microphone arc/holder -->
  <path d="M168 240 Q168 328 256 328 Q344 328 344 240"
        fill="none" stroke="#4ecdc4" stroke-width="24" stroke-linecap="round"/>

  <!-- Microphone stand -->
  <line x1="256" y1="328" x2="256" y2="380" stroke="#4ecdc4" stroke-width="24" stroke-linecap="round"/>

  <!-- Text lines representing transcription -->
  <line x1="144" y1="412" x2="368" y2="412" stroke="#b0b0c8" stroke-width="16" stroke-linecap="round"/>
  <line x1="176" y1="448" x2="336" y2="448" stroke="#8888aa" stroke-width="12" stroke-linecap="round"/>
</svg>
